---
layout: page
# All the Tags of posts.
---

<div id="tags" class="d-flex flex-wrap mx-xl-2">

<link rel="stylesheet" href="https://unpkg.com/vis-network/standalone/umd/vis-network.min.css" type="text/css" />
<script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>
  /* 容器样式：深色星空渐变背景，完美衬托发光的渐变星云 */
  #tags-network-container {
    width: 100%;
    height: 70vh; /* 稍微拉大高度给卫星预留公转轨道空间 */
    border-radius: 16px;
    background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
    box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
    position: relative;
    overflow: hidden;
  }
  .graph-hint {
    font-size: 12px;
    color: #64748b;
    text-align: center;
    margin-top: 8px;
    width: 100%;
  }
</style>

<div id="tags-network-container"></div>
<div class="graph-hint">✨ 星云画布支持拖拽与缩放。点击星云节点可穿越至对应标签页。</div>

<script type="text/javascript">
  document.addEventListener("DOMContentLoaded", function() {
    
    /* --- Step A: 从 Jekyll 动态生成原始数据 --- */
    const tagCounts = {
      {% for t in site.tags %}
        "{{ t[0] }}": {{ t[1].size }}{% unless forloop.last %},{% endunless %}
      {% endfor %}
    };

    const postTagsRelations = [
      {% for post in site.posts %}
        {% if post.tags.size > 1 %}
          [{% for tag in post.tags %}"{{ tag }}"{% unless forloop.last %},{% endunless %}{% endfor %}]{% unless forloop.last %},{% endunless %}
        {% endif %}
      {% endfor %}
    ];

    /* 找出哪些 tag 拥有连线，没有连线的即为孤立卫星 */
    const connectedTags = new Set();
    postTagsRelations.forEach(tags => {
      tags.forEach(t => connectedTags.add(t));
    });

    /* --- Step B: 构建 Vis.js 格式的节点 (Canvas 自定义星云) --- */
    /* 精选 5 组赛博星云渐变色盘 (起点亮色, 边缘半透明色) */
    const nebulaPalettes = [
      { start: 'rgba(244, 63, 94, 0.85)', end: 'rgba(244, 63, 94, 0)' },   /* 玫瑰粉红 */
      { start: 'rgba(14, 165, 233, 0.85)', end: 'rgba(14, 165, 233, 0)' },  /* 天空蓝 */
      { start: 'rgba(168, 85, 247, 0.85)', end: 'rgba(168, 85, 247, 0)' },  /* 幻境紫 */
      { start: 'rgba(234, 179, 8, 0.85)', end: 'rgba(234, 179, 8, 0)' },    /* 琥珀金 */
      { start: 'rgba(34, 197, 94, 0.85)', end: 'rgba(34, 197, 94, 0)' }     /* 荧光绿 */
    ];

    let paletteIdx = 0;
    const nodesArray = Object.keys(tagCounts).map(tagName => {
      const count = tagCounts[tagName];
      const isSatellite = !connectedTags.has(tagName);
      
      /* 根据中文字数动态决定基础半径，确保字绝对在球体内部 */
      const baseSize = 35 + (tagName.length * 4);
      const radius = baseSize + (count * 2.5); 
      
      const palette = nebulaPalettes[paletteIdx % nebulaPalettes.length];
      paletteIdx++;

      return {
        id: tagName,
        label: tagName,
        shape: 'customCanvas',
        /* 使用自定义 Canvas 2D 渲染器 */
        ctxRenderer: function ({ ctx, x, y, state: { selected, hover } }) {
          ctx.save();
          
          /* 1. 绘制发光星云球体 */
          const gradient = ctx.createRadialGradient(x, y, radius * 0.1, x, y, radius);
          gradient.addColorStop(0, '#ffffff'); /* 中心亮核 */
          gradient.addColorStop(0.25, selected || hover ? '#38bdf8' : palette.start);
          gradient.addColorStop(1, palette.end); /* 向外扩散隐形 */
          
          ctx.beginPath();
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.fillStyle = gradient;
          ctx.fill();

          /* 2. 文字完美吃进球体正中心 (完美兼容中英文) */
          ctx.fillStyle = '#ffffff';
          ctx.font = `bold ${Math.max(11, radius * 0.24)}px PingFang SC, Microsoft YaHei, sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          
          /* 加一层文字暗阴影，防止亮色背景下看不清字 */
          ctx.shadowColor = 'rgba(0, 0, 0, 0.9)';
          ctx.shadowBlur = 4;
          
          ctx.fillText(`${tagName} (${count})`, x, y);
          ctx.restore();
        },
        value: radius,
        isSatellite: isSatellite,
        /* 给卫星自定义轨道公转参数 */
        satAngle: Math.random() * Math.PI * 2,
        satSpeed: 0.002 + Math.random() * 0.003, /* 旋转速度 */
        satRadius: 150 + Math.random() * 70       /* 绕主星云的半径 */
      };
    });

    /* --- Step C: 构建连线 (Edges) --- */
    const edgeMap = {};
    postTagsRelations.forEach(tags => {
      for (let i = 0; i < tags.length; i++) {
        for (let j = i + 1; j < tags.length; j++) {
          const key = tags[i] < tags[j] ? `${tags[i]}_${tags[j]}` : `${tags[j]}_${tags[i]}`;
          edgeMap[key] = (edgeMap[key] || 0) + 1;
        }
      }
    });

    const edgesArray = Object.keys(edgeMap).map(key => {
      const [from, to] = key.split('_');
      return {
        from: from,
        to: to,
        width: edgeMap[key] * 2,
        color: { color: 'rgba(255, 255, 255, 0.15)', highlight: '#38bdf8' },
        smooth: { type: 'continuous' }
      };
    });

    /* --- Step D: 稳定的物理布局引擎 --- */
    const container = document.getElementById('tags-network-container');
    const nodesDataSet = new vis.DataSet(nodesArray);
    const data = {
      nodes: nodesDataSet,
