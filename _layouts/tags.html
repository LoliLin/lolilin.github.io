layout: page
# All the Tags of posts.
---

<div id="tags" class="d-flex flex-wrap mx-xl-2">

<link rel="stylesheet" href="https://unpkg.com/vis-network/standalone/umd/vis-network.min.css" type="text/css" />
<script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>
  /* 容器样式：星空深蓝渐变 */
  #tags-network-container {
    width: 100%;
    height: 65vh;
    border-radius: 16px;
    background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
    box-shadow: inset 0 0 30px rgba(0,0,0,0.7);
    position: relative;
    overflow: hidden;
  }
  @media (max-width: 768px) {
    #tags-network-container {
      height: 70vh;
    }
  }
  .graph-hint {
    font-size: 12px;
    color: #64748b;
    text-align: center;
    margin-top: 8px;
    width: 100%;
  }
</style>

<div id="tags-network-container"></div>
<div class="graph-hint">✨ 赛博星云图：支持双指缩放与拖拽。点击节点即可穿越。</div>

<script type="text/javascript">
  document.addEventListener("DOMContentLoaded", function() {
    
    /* --- Step A: 从 Jekyll 动态生成原始数据 --- */
    const tagCounts = {
      {% for t in site.tags %}
        "{{ t[0] }}": {{ t[1].size }}{% unless forloop.last %},{% endunless %}
      {% endfor %}
    };

    const postTagsRelations = [
      {% for post in site.posts %}
        {% if post.tags.size > 1 %}
          [{% for tag in post.tags %}"{{ tag }}"{% unless forloop.last %},{% endunless %}{% endfor %}]{% unless forloop.last %},{% endunless %}
        {% endif %}
      {% endfor %}
    ];

    /* 筛出有连线的标签 */
    const connectedTags = new Set();
    postTagsRelations.forEach(tags => {
      tags.forEach(t => connectedTags.add(t));
    });

    /* --- Step B: 构建节点 (使用内置 ellipse 完美的将字包裹在球内) --- */
    /* 采用高饱和、带呼吸感的霓虹配色 */
    const neonColors = [
      { bg: '#f43f5e', border: '#fda4af', hover: '#ffe4e6' }, /* 妖艳粉 */
      { bg: '#0ea5e9', border: '#7dd3fc', hover: '#e0f2fe' }, /* 科技蓝 */
      { bg: '#a855f7', border: '#c084fc', hover: '#f3e8ff' }, /* 幻境紫 */
      { bg: '#eab308', border: '#fef08a', hover: '#fef9c3' }, /* 琥珀金 */
      { bg: '#22c55e', border: '#86efac', hover: '#dcfce7' }  /* 荧光绿 */
    ];

    let colorIdx = 0;
    const nodesArray = Object.keys(tagCounts).map(tagName => {
      const count = tagCounts[tagName];
      const isSatellite = !connectedTags.has(tagName);
      const color = neonColors[colorIdx % neonColors.length];
      colorIdx++;

      return {
        id: tagName,
        /* 标签名字和数量直接写在一起 */
        label: `${tagName} (${count})`,
        /* 使用官方内置形状 ellipse，字天然在球体内部，且完美兼容中文字符 */
        shape: 'ellipse',
        /* 根据文章数量等比缩放字号，形状会自动同步等比变大 */
        font: { 
          size: 13 + (count * 2), 
          color: '#ffffff', 
          face: 'PingFang SC, Microsoft YaHei, sans-serif',
          bold: true
        },
        color: {
          background: color.bg,
          border: color.border,
          highlight: { background: '#38bdf8', border: '#ffffff' },
          hover: { background: color.bg, border: color.hover }
        },
        borderWidth: 2,
        /* 开启官方内置的光影阴影效果，制造悬浮星空感 */
        shadow: {
          enabled: true,
          color: 'rgba(0, 0, 0, 0.6)',
          size: 10,
          x: 0,
          y: 4
        },
        /* 挂载卫星公转属性 */
        isSatellite: isSatellite,
        satAngle: Math.random() * Math.PI * 2,
        satSpeed: 0.002 + Math.random() * 0.003,
        satRadius: 140 + Math.random() * 50
      };
    });

    /* --- Step C: 构建连线 (Edges) --- */
    const edgeMap = {};
    postTagsRelations.forEach(tags => {
      for (let i = 0; i < tags.length; i++) {
        for (let j = i + 1; j < tags.length; j++) {
          const key = tags[i] < tags[j] ? `${tags[i]}_${tags[j]}` : `${tags[j]}_${tags[i]}`;
          edgeMap[key] = (edgeMap[key] || 0) + 1;
        }
      }
    });

    const edgesArray = Object.keys(edgeMap).map(key => {
      const [from, to] = key.split('_');
      return {
        from: from,
        to: to,
        width: edgeMap[key] * 2,
        /* 半透明发光白线 */
        color: { color: 'rgba(255, 255, 255, 0.15)', highlight: '#38bdf8', hover: 'rgba(255, 255, 255, 0.4)' },
        smooth: { type: 'continuous' },
        shadow: { enabled: true, color: 'rgba(0,0,0,0.3)', size: 3 }
      };
    });

    /* --- Step D: 官方物理引擎与交互配置 --- */
    const container = document.getElementById('tags-network-container');

    const data = {
      nodes: nodesDataSet,
      edges: new vis.DataSet(edgesArray)
    };

          gravitationalConstant: -40,
