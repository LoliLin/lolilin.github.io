---
layout: page
/* All the Tags of posts with an interactive relations network graph. */
---

<script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>
  /* 严格控制容器本身的尺寸和样式，作为画布的物理围墙 */
  #tags-network-container {
    width: 100%;
    height: 70vh;
    border-radius: 16px;
    background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
    box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
    position: relative;
    overflow: hidden;
  }
  .graph-hint {
    font-size: 12px;
    color: #64748b;
    text-align: center;
    margin-top: 8px;
  }
</style>

<div id="tags-network-container" class="mx-xl-2"></div>
<div class="graph-hint">✨ 星云画布支持拖拽与双指缩放。点击星云节点可穿越至对应标签页。</div>

<script type="text/javascript">
  document.addEventListener("DOMContentLoaded", function() {
    
    /* --- Step A: 数据提取 --- */
    const tagCounts = {
      {% for t in site.tags %}
        "{{ t[0] }}": {{ t[1].size }}{% unless forloop.last %},{% endunless %}
      {% endfor %}
    };

    const postTagsRelations = [
      {% for post in site.posts %}
        {% if post.tags.size > 1 %}
          [{% for tag in post.tags %}"{{ tag }}"{% unless forloop.last %},{% endunless %}{% endfor %}]{% unless forloop.last %},{% endunless %}
        {% endif %}
      {% endfor %}
    ];

    const connectedTags = new Set();
    postTagsRelations.forEach(tags => {
      tags.forEach(t => connectedTags.add(t));
    });

    /* --- Step B: 构建节点 --- */
    const nebulaPalettes = [
      { start: 'rgba(244, 63, 94, 0.8)', end: 'rgba(244, 63, 94, 0)' },
      { start: 'rgba(14, 165, 233, 0.8)', end: 'rgba(14, 165, 233, 0)' },
      { start: 'rgba(168, 85, 247, 0.8)', end: 'rgba(168, 85, 247, 0)' },
      { start: 'rgba(234, 179, 8, 0.8)', end: 'rgba(234, 179, 8, 0)' },
      { start: 'rgba(34, 197, 94, 0.8)', end: 'rgba(34, 197, 94, 0)' }
    ];

    let paletteIdx = 0;
    const nodesArray = Object.keys(tagCounts).map(tagName => {
      const count = tagCounts[tagName];
      const isSatellite = !connectedTags.has(tagName);
      
      const baseSize = 35 + (tagName.length * 4);
      const radius = baseSize + (count * 3); 
      
      const palette = nebulaPalettes[paletteIdx % nebulaPalettes.length];
      paletteIdx++;

      const angle = Math.random() * Math.PI * 2;
      const speed = 0.003 + Math.random() * 0.004; /* 稍微放慢旋转速度，更优雅 */

      return {
        id: tagName,
        label: tagName,
        shape: 'customCanvas',
        ctxRenderer: function ({ ctx, x, y, state: { selected, hover } }) {
          ctx.save();
          
          /* 星云球体 */
          const gradient = ctx.createRadialGradient(x, y, radius * 0.1, x, y, radius);
          gradient.addColorStop(0, '#ffffff');
          gradient.addColorStop(0.2, selected || hover ? '#38bdf8' : palette.start);
          gradient.addColorStop(1, palette.end);
          
          ctx.beginPath();
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.fillStyle = gradient;
          ctx.fill();

          /* 文字完美居中 */
          ctx.fillStyle = '#ffffff';
          ctx.font = `bold ${Math.max(12, radius * 0.26)}px PingFang SC, Microsoft YaHei, sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          
          ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
          ctx.shadowBlur = 4;
          
          ctx.fillText(`${tagName} (${count})`, x, y);
          ctx.restore();
        },
        value: radius,
        radius: radius, /* 留存半径数据用于边界碰撞检测 */
        isSatellite: isSatellite,
        satAngle: angle,
        satSpeed: speed,
        satRadius: 150 + Math.random() * 80 
      };
    });

    /* --- Step C: 构建连线 --- */
    const edgeMap = {};
    postTagsRelations.forEach(tags => {
      for (let i = 0; i < tags.length; i++) {
        for (let j = i + 1; j < tags.length; j++) {
          const key = tags[i] < tags[j] ? `${tags[i]}_${tags[j]}` : `${tags[j]}_${tags[i]}`;
          edgeMap[key] = (edgeMap[key] || 0) + 1;
        }
      }
    });

    const edgesArray = Object.keys(edgeMap).map(key => {
      const [from, to] = key.split('_');
      return {
        from: from,
        to: to,
        width: edgeMap[key] * 2,
        color: { color: 'rgba(255, 255, 255, 0.12)', highlight: '#38bdf8' },
        smooth: { type: 'continuous' }
      };
    });

    /* --- Step D: 物理引擎初始化 --- */
    const container = document.getElementById('tags-network-container');
    const nodesDataSet = new vis.DataSet(nodesArray);
    const data = { nodes: nodesDataSet, edges: new vis.DataSet(edgesArray) };
    
    const options = {
      physics: {
        forceAtlas2Based: {
          gravitationalConstant: -40, /* 稍微减小排斥，防止把卫星推太远 */
          centralGravity: 0.04,
          springLength: 120,
          springConstant: 0.08
        },
        solver: 'forceAtlas2Based',
        stabilization: { iterations: 100 }
      },
      interaction: { hover: true, zoomView: true, dragView: true }
    };

         /* 自定义物理碰撞体积，防止重叠 */
        scaling: { label: { enabled: false } },
        value: radius,
        /* 挂载卫星独有的旋转属性 */
        isSatellite: isSatellite,
        satAngle: angle,
        satSpeed: speed,
        satRadius: 180 + Math.random() * 100 /* 绕主星云运行的轨道半径 */
      };
    });

    /* --- Step C: 构建连线 --- */
    const edgeMap = {};
    postTagsRelations.forEach(tags => {
      for (let i = 0; i < tags.length; i++) {
        for (let j = i + 1; j < tags.length; j++) {
          const key = tags[i] < tags[j] ? `${tags[i]}_${tags[j]}` : `${tags[j]}_${tags[i]}`;
          edgeMap[key] = (edgeMap[key] || 0) + 1;
        }
      }
    });

    const edgesArray = Object.keys(edgeMap).map(key => {
      const [from, to] = key.split('_');
      return {
        from: from,
        to: to,
        width: edgeMap[key] * 2,
        color: { color: 'rgba(255, 255, 255, 0.15)', highlight: '#38bdf8' },
        smooth: { type: 'continuous' }
      };
    });

    /* --- Step D: 配置物理引擎与边界控制 --- */
    const container = document.getElementById('tags-network-container');
    const nodesDataSet = new vis.DataSet(nodesArray);
    const data = { nodes: nodesDataSet, edges: new vis.DataSet(edgesArray) };
    
    const options = {
      physics: {
        forceAtlas2    const container = document.getElementById('tags-network-container');
    const data = {
      nodes: new vis.DataSet(nodesArray),
      edges: new vis.DataSet(edgesArray)
    };
    
    const options = {
      nodes: {
        scaling: { min: 15, max: 50 }
      },
      physics: {
        forceAtlas2Based: {
          gravitationalConstant: -50,
          centralGravity: 0.05, /* 调高至 0.05，让孤立的 tag 也能受到向心力，收拢在星云外围不乱飞 */
          springLength: 100,
          springConstant: 0.08
        },
        solver: 'forceAtlas2Based',
        stabilization: { iterations: 150 } /* 预先稳定布局，防止一打开乱飞 */
      },
      interaction: {
        hover: true,
        tooltipDelay: 200,
        zoomView: true /* 支持双指缩放 */
      }
    };

    const network = new vis.Network(container, data, options);

    /* --- Step E: 点击标签跳转到对应的分类页 --- */
    network.on("click", function(params) {
      if (params.nodes.length > 0) {
        const selectedTag = params.nodes[0];
        /* 映射成你的 Jekyll 标签 URL 规则 */
        /* 原本是: /tags/tag-name/ */
        const slugifiedTag = encodeURIComponent(selectedTag.toLowerCase().replace(/[^a-z0-9]/g, '-'));
        const targetUrl = `{{ '/tags/' | relative_url }}${slugifiedTag}/`;
        
        /* 延迟一小会儿跳转，让用户看清点击反馈 */
        setTimeout(() => {
          window.location.href = targetUrl;
        }, 150);
      }
    });
  });
</script>
