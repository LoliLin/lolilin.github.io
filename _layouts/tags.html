---
layout: page
# All the Tags of posts.
---

<div id="tags" class="d-flex flex-wrap mx-xl-2">

<div id="star-chart-wrapper" style="width:100vw; height:100vh; overflow:hidden; position:relative;">
    <!-- ===== 样式（仅作用于本组件内部） ===== -->
    <style>
        /* 重置内部元素 */
        .star-chart-wrapper * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .star-chart-wrapper {
            width: 100%;
            height: 100%;
            background: transparent; /* 完全透明，继承父背景 */
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            color: #fff;
            user-select: none;
            position: relative;
        }
        #chart-container {
            width: 100%;
            height: 100%;
        }
    </style>

    <!-- ===== 图表容器 ===== -->
    <div id="chart-container"></div>

    <!-- ===== 脚本（包含所有数据和逻辑） ===== -->
    <script>
        // 立即执行函数，避免全局污染
        (function() {
            // ---------- 数据 ----------
            const tagCounts = {
              {% for t in site.tags %}
                "{{ t[0] }}": {{ t[1].size }}{% unless forloop.last %},{% endunless %}
              {% endfor %}
            };

            const postTagsRelations = [
              {% for post in site.posts %}
                {% if post.tags.size > 1 %}
                  [{% for tag in post.tags %}"{{ tag }}"{% unless forloop.last %},{% endunless %}{% endfor %}]{% unless forloop.last %},{% endunless %}
                {% endif %}
              {% endfor %}
            ]
            const tagLinkMap = {
              {% for t in site.tags %}
                "{{ t[0] }}": "{{ t | slugify | url_encode | prepend: '/tags/' | append: '/' | relative_url }}"{% unless forloop.last %},{% endunless %}
              {% endfor %}
            };

            const nodes = Object.keys(tagCounts).map(key => {
                const count = tagCounts[key];
                const baseSize = 18;
                const size = baseSize + count * 10;
                return {
                    name: key,
                    value: count,
                    symbolSize: Math.min(size, 60),
                    itemStyle: { color: null }
                };
            });

            function getColorFromName(name) {
                let hash = 0;
                for (let i = 0; i < name.length; i++) {
                    hash = name.charCodeAt(i) + ((hash << 5) - hash);
                }
                const hue = 200 + Math.abs(hash % 140);
                const sat = 60 + Math.abs(hash % 25);
                const lig = 60 + Math.abs(hash % 25);
                return `hsl(${hue}, ${sat}%, ${lig}%)`;
            }

            nodes.forEach(node => {
                node.itemStyle = {
                    color: getColorFromName(node.name),
                    borderColor: 'rgba(255,255,255,0.15)',
                    borderWidth: 1.5,
                    shadowBlur: 18,
                    shadowColor: 'rgba(120, 80, 255, 0.25)'
                };
            });

            const edgeSet = new Set();
            const edges = [];
            postTagsRelations.forEach(group => {
                for (let i = 0; i < group.length; i++) {
                    for (let j = i + 1; j < group.length; j++) {
                        const a = group[i];
                        const b = group[j];
                        const key = [a, b].sort().join('|||');
                        if (!edgeSet.has(key)) {
                            edgeSet.add(key);
                            edges.push({
                                source: a,
                                target: b,
                                lineStyle: {
                                    color: 'rgba(180, 160, 255, 0.25)',
                                    width: 1.8,
                                    curveness: 0.15,
                                    opacity: 0.6,
                                    shadowBlur: 6,
                                    shadowColor: 'rgba(100, 80, 255, 0.15)'
                                }
                            });
                        }
                    }
                }
            });

            
            const container = document.getElementById('chart-container');
            const myChart = echarts.init(container, 'dark', { renderer: 'canvas' });

            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(16, 10, 35, 0.85)',
                    borderColor: 'rgba(180, 160, 255, 0.25)',
                    borderWidth: 1,
                    padding: [10, 16],
                    textStyle: { color: '#f0ecff', fontSize: 13 },
                    formatter: function(params) {
                        if (params.dataType === 'node') {
                            const name = params.name;
                            const count = tagCounts[name] || 0;
                            const hasLink = tagLinkMap[name] ? '🔗 可点击跳转' : '';
                            return `
                                    <strong style="font-size:15px; color:#c8b8ff;">✦ ${name}</strong><br/>
                                    出现次数：<strong style="color:#a78aff;">${count}</strong> 次
                                    ${hasLink ? '<br/><span style="color:rgba(180,200,255,0.7);">' + hasLink + '</span>' : ''}
                                `;
                        } else if (params.dataType === 'edge') {
                            return `
                                    <span style="color:#b8a5ff;">${params.data.source}</span>
                                    <span style="color:rgba(255,255,255,0.3);"> ⟷ </span>
                                    <span style="color:#b8a5ff;">${params.data.target}</span>
                                `;
                        }
                        return '';
                    }
                },
                series: [{
                    type: 'graph',
                    layout: 'force',
                    force: {
                        repulsion: 380,
                        edgeLength: [120, 280],
                        gravity: 0.08,
                        friction: 0.12,
                        layoutAnimation: true,
                    },
                    data: nodes,
                    edges: edges,
                    symbol: 'circle',
                    symbolSize: function(val, params) {
                        return params.data.symbolSize || 22;
                    },
                    label: {
                        show: true,
                        position: 'inside',
                        color: '#ffffff',
                        fontSize: 11,
                        fontWeight: 500,
                        fontFamily: '"Segoe UI", "PingFang SC", sans-serif',
                        textShadowBlur: 8,
                        textShadowColor: 'rgba(0, 0, 0, 0.7)',
                        overflow: 'break',
                        lineHeight: 14,
                    },
                    edgeSymbol: ['none', 'none'],
                    edgeLabel: { show: false },
                    lineStyle: {
                        color: 'rgba(180, 160, 255, 0.2)',
                        width: 1.5,
                        curveness: 0.15,
                        opacity: 0.5
                    },
                    emphasis: {
                        focus: 'adjacency',
                        lineStyle: {
                            width: 3,
                            color: 'rgba(200, 180, 255, 0.7)',
                            shadowBlur: 12,
                            shadowColor: 'rgba(130, 100, 255, 0.4)'
                        },
                        itemStyle: {
                            shadowBlur: 28,
                            shadowColor: 'rgba(130, 100, 255, 0.5)',
                            borderWidth: 2.5,
                            borderColor: 'rgba(255,255,255,0.5)'
                        },
                        label: {
                            fontSize: 13,
                            fontWeight: 600,
                            color: '#ffffff',
                            textShadowBlur: 12,
                            textShadowColor: 'rgba(0,0,0,0.8)'
                        }
                    },
                    roam: true,
                    draggable: true,
                    animationDuration: 1500,
                    animationEasing: 'cubicOut',
                    categories: [],
                }]
            };

            myChart.setOption(option);

            myChart.on('click', function(params) {
                if (params.dataType === 'node') {
                    const tagName = params.name;
                    myChart.dispatchAction({
                        type: 'highlight',
                        seriesIndex: 0,
                        dataIndex: params.dataIndex
                    });
                    const link = tagLinkMap[tagName];
                    if (link) {
                        window.open(link, '_blank');
                    }
                } else {
                    myChart.dispatchAction({ type: 'downplay', seriesIndex: 0 });
                }
            });

            function resizeChart() {
                myChart.resize();
            }
            window.addEventListener('resize', resizeChart);
            if (window.ResizeObserver) {
                const ro = new ResizeObserver(() => resizeChart());
                ro.observe(container);
            }

            function resetLayout() {
                myChart.setOption({
                    series: [{
                        force: {
                            layoutAnimation: true,
                            repulsion: 380,
                            edgeLength: [120, 280],
                        }
                    }]
                });
                myChart.setOption({
                    series: [{ data: nodes, edges: edges }]
                });
            }
            container.addEventListener('dblclick', resetLayout);
            document.addEventListener('keydown', function(e) {
                if ((e.key === 'r' || e.key === 'R') && !e.ctrlKey && !e.metaKey) {
                    resetLayout();
                    e.preventDefault();
                }
            });

            console.log('✨ 标签星图已加载（组件模式）');
        })();
    </script>

    <!-- 确保 ECharts 库已加载（若宿主页面未加载，需提前引入） -->
    <!-- 如果宿主页面已全局引入 ECharts，可注释掉下一行 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js">
    </script>
</div>
</div>
    ];
