---
layout: default
---

{% include lang.html %}

<article class="px-1">
    {% assign title = page.title %}
    <h1 class="dynamic-title">
      {{ title }}
    </h1>
    
    <div class="content" style="text-autospace: ideograph-alpha ideograph-numeric ideograph-parenthesis;">
        
        <div class="terminal-container">
          <style>
    /* 专属于该页面的终端与正文样式 */
    :root {
        --bg-color: #0d1117;
        --text-color: #c9d1d9;
        --accent-color: #58a6ff;
        --terminal-green: #39ff14;
        --border-color: #30363d;
        --quote-bg: #161b22;
    }

    .terminal-container {
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
    }

    .terminal {
        background-color: #05070a;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        padding: 20px;
        font-family: "Courier New", Courier, monospace;
        color: #f0f6fc;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        margin-bottom: 30px;
    }

    .terminal-header {
        display: flex;
        gap: 8px;
        margin-bottom: 15px;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 10px;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-red { background-color: #ff5f56; }
    .dot-yellow { background-color: #ffbd2e; }
    .dot-green { background-color: #27c93f; }

    .line { margin: 3px 0; white-space: pre-wrap; word-break: break-all; }
    .command { color: var(--accent-color); }
    .success { color: var(--terminal-green); }

    .cursor {
        display: inline-block;
        width: 8px;
        height: 18px;
        background-color: var(--terminal-green);
        animation: blink 1s infinite;
        vertical-align: middle;
        margin-left: 4px;
    }

    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

#main-content {
    opacity: 0;
    pointer-events: none;
    transform: translateY(15px);
    transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

/* 完美切入：透明度恢复，恢复鼠标事件 */
#main-content.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
}

    /* 保证内容区域内部的样式 */
    .content-area h1, .content-area h2, .content-area h3 { color: #ffffff; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
    .content-area h1 { font-size: 2rem; }
    .content-area h2 { font-size: 1.5rem; margin-top: 30px; }
    .content-area a { color: var(--accent-color); text-decoration: none; }
    .content-area a:hover { text-decoration: underline; }
    .content-area blockquote {
        background-color: var(--quote-bg);
        border-left: 4px solid var(--accent-color);
        margin: 20px 0;
        padding: 15px;
        font-style: italic;
        border-radius: 0 4px 4px 0;
    }
    .content-area pre code { display: block; padding: 15px; overflow-x: auto; background-color: #161b22; border: 1px solid var(--border-color); }
    .content-area ul { padding-left: 20px; }
    .content-area li { margin-bottom: 10px; }
</style>
            <div class="terminal" id="terminal">
                <div class="terminal-header">
                    <div class="dot dot-red"></div>
                    <div class="dot dot-yellow"></div>
                    <div class="dot dot-green"></div>
                    <span style="margin-left: 10px; font-size: 12px; color: #8b949e;">bash — blog.kawaiis.in</span>
                </div>
                <div id="terminal-body"></div>
            </div>

            <article id="main-content" class="content-area">
                {{ content }}
                <div class="music-player">
                  {% include music-set.html %}
                </div>
            </article>
        </div>

    </div>
</article>

<script>
(function() {
    const terminalBody = document.getElementById('terminal-body');
    const mainContent = document.getElementById('main-content');
    const terminal = document.getElementById('terminal');

    // 如果元素还没出现，延迟重试（处理 pjax/动态加载）
    if (!terminalBody || !mainContent) {
        requestAnimationFrame(arguments.callee);
        return;
    }

    const script = [
        ["cmd", "guest@kawaiis.in:~# grep -R \"Lolin\" ./verse", 400],
        ["log", ">> A password changes, a trend fades, but a well-architected philosophy remains compile-ready.", 200],
        ["cmd", "guest@kawaiis.in:~# curl -s https://blog.kawaiis.in/api/lolin-verse | decrypt", 250],
        ["log", "[INFO] Decrypting \"小狐狸.sys\" [████████████████████] 100%", 400],
        ["cmd", "guest@kawaiis.in:~# ./compile_life.sh --mode=\"gentle\"", 150],
        ["log", "Loading memories: ...", 400],
        ["cmd", "guest@kawaiis.in:~# cat overview.md", 300]
    ];

    let currentLine = 0;

    function createLine(type, text) {
        const lineDiv = document.createElement('div');
        lineDiv.className = 'line';
        if (type === 'cmd') {
            lineDiv.innerHTML = '<span class="command">' + text + '</span>';
        } else if (type === 'success') {
            lineDiv.innerHTML = '<span class="success">' + text + '</span>';
        } else {
            lineDiv.textContent = text;
        }
        return lineDiv;
    }

    function runScript() {
        if (currentLine < script.length) {
            var _a = script[currentLine], type = _a[0], text = _a[1], delay = _a[2];
            var oldCursor = document.querySelector('.cursor');
            if (oldCursor) oldCursor.remove();
            var lineElement = createLine(type, text);
            var cursor = document.createElement('span');
            cursor.className = 'cursor';
            lineElement.appendChild(cursor);
            terminalBody.appendChild(lineElement);
            terminal.scrollTop = terminal.scrollHeight;
            currentLine++;
            setTimeout(runScript, delay);
        } else {
            setTimeout(function() {
                var oldCursor = terminalBody.querySelector('.cursor');
                if (oldCursor) oldCursor.remove();
                mainContent.classList.add('visible');
            }, 200);
        }
    }

    // 使用 requestAnimationFrame 确保 DOM 已稳定
    requestAnimationFrame(function() {
        setTimeout(runScript, 100);
    });
})();
</script>
