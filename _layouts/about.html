<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关乎此间 | Lolin Verse</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --terminal-green: #39ff14;
            --border-color: #30363d;
            --quote-bg: #161b22;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .terminal {
            background-color: #05070a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            font-family: "Courier New", Courier, monospace;
            color: #f0f6fc;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        .terminal-header {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background-color: #ff5f56; }
        .dot-yellow { background-color: #ffbd2e; }
        .dot-green { background-color: #27c93f; }

        .line { margin: 3px 0; white-space: pre-wrap; word-break: break-all; }
        .command { color: var(--accent-color); }
        .success { color: var(--terminal-green); }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background-color: var(--terminal-green);
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 4px;
        }

        @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

        /* 正文平滑切入 */
        #main-content {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: none;
        }

        #main-content.visible {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        h1, h2, h3 { color: #ffffff; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        h1 { font-size: 2rem; }
        h2 { font-size: 1.5rem; margin-top: 30px; }
        a { color: var(--accent-color); text-decoration: none; }
        a:hover { text-decoration: underline; }
        blockquote {
            background-color: var(--quote-bg);
            border-left: 4px solid var(--accent-color);
            margin: 20px 0;
            padding: 15px;
            font-style: italic;
            border-radius: 0 4px 4px 0;
        }
        pre code { display: block; padding: 15px; overflow-x: auto; background-color: #161b22; border: 1px solid var(--border-color); }
        ul { padding-left: 20px; }
        li { margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="terminal" id="terminal">
        <div class="terminal-header">
            <div class="dot dot-red"></div>
            <div class="dot dot-yellow"></div>
            <div class="dot dot-green"></div>
            <span style="margin-left: 10px; font-size: 12px; color: #8b949e;">bash — blog.kawaiis.in</span>
        </div>
        <div id="terminal-body"></div>
    </div>

    <article id="main-content">
        {{ content }}
        <div class="music-player">
          {% include music-set.html %}
        </div>
    </article>
</div>

<script>
    const terminalBody = document.getElementById("terminal-body");
    const mainContent = document.getElementById("main-content");
    const terminal = document.getElementById("terminal");

    // 高速执行剧本：大幅缩减延迟
    const script = [
        ["cmd", "guest@kawaiis.in:~# grep -R "Lolin" ./verse", 400],
        ["log", ">> A password changes, a trend fades, but a well-architected philosophy remains compile-ready.", 200],
        ["cmd", "guest@kawaiis.in:~# curl -s https://blog.kawaiis.in/api/lolin-verse | decrypt", 250],
        ["log", "[INFO] Decrypting "小狐狸.sys" [████████████████████] 100%", 400],
        ["cmd", "guest@kawaiis.in:~# ./compile_life.sh --mode="gentle"", 150],
        ["log", "Loading memories: ...", 400],
        ["cmd", "guest@kawaiis.in:~# cat overview.md", 300]
    ];

    let currentLine = 0;

    function createLine(type, text) {
        const lineDiv = document.createElement("div");
        lineDiv.className = "line";
        if (type === "cmd") {
            lineDiv.innerHTML = `<span class="command">${text}</span>`;
        } else if (type === "success") {
            lineDiv.innerHTML = `<span class="success">${text}</span>`;
        } else {
            lineDiv.textContent = text;
        }
        return lineDiv;
    }

    function runScript() {
        if (currentLine < script.length) {
            const [type, text, delay] = script[currentLine];
            
            const oldCursor = document.querySelector(".cursor");
            if (oldCursor) oldCursor.remove();

            const lineElement = createLine(type, text);
            
            const cursor = document.createElement("span");
            cursor.className = "cursor";
            lineElement.appendChild(cursor);
            
            terminalBody.appendChild(lineElement);
            terminal.scrollTop = terminal.scrollHeight;
            
            currentLine++;
            setTimeout(runScript, delay);
        } else {
            // 结束时平滑但快速地切入正文
            setTimeout(() => {
                const oldCursor = document.querySelector(".cursor");
                if (oldCursor) oldCursor.remove();
                
                mainContent.style.display = "block";
                mainContent.offsetHeight; 
                mainContent.classList.add("visible");
            }, 200);
        }
    }

    window.onload = () => {
        setTimeout(runScript, 100);
    };
</script>

</body>
