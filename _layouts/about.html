---
layout: default
---

{% include lang.html %}

<article class="px-1">
    {% assign title = page.title %}
    <h1 class="dynamic-title">
      {{ title }}
    </h1>
    
    <div class="content" style="text-autospace: ideograph-alpha ideograph-numeric ideograph-parenthesis;">
        
        <div class="terminal-container">
          <style>
/* 终端区域完全隔离，不影响正文 */
.terminal-container {
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
}
.terminal {
  background-color: #05070a !important;
  border: 1px solid #30363d !important;
  border-radius: 6px;
  padding: 20px;
  font-family: "Courier New", Courier, monospace !important;
  color: #f0f6fc !important;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  margin-bottom: 30px;
}
.terminal .terminal-header {
  display: flex;
  gap: 8px;
  margin-bottom: 15px;
  border-bottom: 1px solid #30363d;
  padding-bottom: 10px;
}
.terminal .dot { width: 12px; height: 12px; border-radius: 50%; }
.terminal .dot-red { background-color: #ff5f56 !important; }
.terminal .dot-yellow { background-color: #ffbd2e !important; }
.terminal .dot-green { background-color: #27c93f !important; }

/* 关键：强制覆盖主题干扰 */
.terminal .line {
  margin: 3px 0 !important;
  white-space: pre-wrap !important;
  word-break: break-all !important;
  color: #c9d1d9 !important;       /* 主文字色 */
  font-family: inherit !important;
  background: transparent !important;
  border: none !important;
  padding: 0 !important;
  line-height: 1.6 !important;
}
.terminal .command { color: #58a6ff !important; }
.terminal .success { color: #39ff14 !important; }

.terminal .cursor {
  display: inline-block;
  width: 8px;
  height: 18px;
  background-color: #39ff14 !important;
  animation: blink 1s infinite;
  vertical-align: middle;
  margin-left: 4px;
}
@keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

/* 正文渐入保持原样 */
#main-content {
  opacity: 0;
  pointer-events: none;
  transform: translateY(15px);
  transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
#main-content.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}
</style>
            <div class="terminal" id="terminal">
                <div class="terminal-header">
                    <div class="dot dot-red"></div>
                    <div class="dot dot-yellow"></div>
                    <div class="dot dot-green"></div>
                    <span style="margin-left: 10px; font-size: 12px; color: #8b949e;">bash — blog.kawaiis.in</span>
                </div>
                <div id="terminal-body"></div>
            </div>

            <article id="main-content" class="content-area">
                {{ content }}
                <div class="music-player">
                  {% include music-set.html %}
                </div>
            </article>
        </div>

    </div>
</article>

<script>
(function() {
    function initTerminal() {
        const terminalBody = document.getElementById('terminal-body');
        const mainContent = document.getElementById('main-content');
        const terminal = document.getElementById('terminal');

        if (!terminalBody || !mainContent) return false;

        const script = [
            ["cmd", "guest@kawaiis.in:~# grep -R \"Lolin\" ./verse", 400],
            ["log", ">> A password changes, a trend fades, but a well-architected philosophy remains compile-ready.", 200],
            ["cmd", "guest@kawaiis.in:~# curl -s https://blog.kawaiis.in/api/lolin-verse | decrypt", 250],
            ["log", "[INFO] Decrypting \"小狐狸.sys\" [████████████████████] 100%", 400],
            ["cmd", "guest@kawaiis.in:~# ./compile_life.sh --mode=\"gentle\"", 150],
            ["log", "Loading memories: ...", 400],
            ["cmd", "guest@kawaiis.in:~# cat overview.md", 300]
        ];

        let currentLine = 0;

        function createLine(type, text) {
            const lineDiv = document.createElement('div');
            lineDiv.className = 'line';
            // 直接用内联样式确保颜色
            lineDiv.style.color = '#c9d1d9';
            if (type === 'cmd') {
                lineDiv.innerHTML = '<span class="command" style="color:#58a6ff">' + text + '</span>';
            } else if (type === 'success') {
                lineDiv.innerHTML = '<span class="success" style="color:#39ff14">' + text + '</span>';
            } else {
                lineDiv.textContent = text;
            }
            return lineDiv;
        }

        function runScript() {
            if (currentLine < script.length) {
                const [type, text, delay] = script[currentLine];
                const oldCursor = document.querySelector('.cursor');
                if (oldCursor) oldCursor.remove();

                const lineElement = createLine(type, text);
                const cursor = document.createElement('span');
                cursor.className = 'cursor';
                cursor.style.display = 'inline-block';
                cursor.style.width = '8px';
                cursor.style.height = '18px';
                cursor.style.backgroundColor = '#39ff14';
                lineElement.appendChild(cursor);

                terminalBody.appendChild(lineElement);
                terminal.scrollTop = terminal.scrollHeight;

                currentLine++;
                setTimeout(runScript, delay);
            } else {
                setTimeout(function() {
                    const oldCursor = terminalBody.querySelector('.cursor');
                    if (oldCursor) oldCursor.remove();
                    mainContent.classList.add('visible');
                }, 200);
            }
        }

        runScript();
        return true;
    }

    // 确保在 DOM 和 CSS 完全就绪后启动
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        // 稍作延迟，等待主题可能的动态渲染完成
        setTimeout(function() { initTerminal(); }, 50);
    } else {
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(initTerminal, 50);
        });
    }
})();
</script>
