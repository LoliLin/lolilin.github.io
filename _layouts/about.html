---
layout: default
---

{% include lang.html %}

<style>
    .about-wrapper {
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
    }

    /* 完美的沙盒隔离，隐藏边框 */
    #terminal-iframe {
        width: 100%;
        height: 240px; /* 预留足够高度给动画 */
        border: none;
        background: transparent;
        display: block;
        margin-bottom: 20px;
    }

    /* 初始隐藏正文与音乐 */
    #main-content {
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        display: none;
    }

    #main-content.visible {
        display: block;
        opacity: 1;
        transform: translateY(0);
    }
    
    .music-player {
        margin-top: 30px;
    }
</style>

<div class="about-wrapper">
    <!-- 利用 srcdoc 将整个终端沙盒打包塞进 iframe，不受任何外部主题干扰 -->
    <iframe id="terminal-iframe" srcdoc='
        <!DOCTYPE html>
        <html>
        <head>
            <style>
                body { margin: 0; background: transparent; overflow: hidden; }
                .terminal {
                    background-color: #05070a;
                    border: 1px solid #30363d;
                    border-radius: 6px;
                    padding: 20px;
                    font-family: "Courier New", Courier, monospace;
                    color: #f0f6fc;
                    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                    box-sizing: border-box;
                    height: 220px;
                }
                .terminal-header { display: flex; gap: 8px; margin-bottom: 15px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
                .dot { width: 12px; height: 12px; border-radius: 50%; }
                .dot-red { background-color: #ff5f56; }
                .dot-yellow { background-color: #ffbd2e; }
                .dot-green { background-color: #27c93f; }
                .line { margin: 3px 0; white-space: pre-wrap; word-break: break-all; font-size: 14px; }
                .command { color: #58a6ff; }
                .success { color: #39ff14; }
                .cursor { display: inline-block; width: 8px; height: 18px; background-color: #39ff14; animation: blink 1s infinite; vertical-align: middle; margin-left: 4px; }
                @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
            </style>
        </head>
        <body>
            <div class="terminal" id="terminal">
                <div class="terminal-header">
                    <div class="dot dot-red"></div>
                    <div class="dot dot-yellow"></div>
                    <div class="dot dot-green"></div>
                    <span style="margin-left: 10px; font-size: 12px; color: #8b949e;">bash — blog.kawaiis.in</span>
                </div>
                <div id="terminal-body"></div>
            </div>

            <script>
                const terminalBody = document.getElementById("terminal-body");
                const script = [
        ['cmd', 'guest@kawaiis.in:~# grep -R "Lolin" ./verse', 400],
        ['log', '>> A password changes, a trend fades, but a well-architected philosophy remains compile-ready.', 200],
        ['cmd', 'guest@kawaiis.in:~# curl -s https://blog.kawaiis.in/api/lolin-verse | decrypt', 250],
        ['log', '[INFO] Decrypting "小狐狸.sys" [████████████████████] 100%', 400],
        ['cmd', 'guest@kawaiis.in:~# ./compile_life.sh --mode="gentle"', 150],
        ['log', 'Loading memories: ...', 400],
        ['cmd', 'guest@kawaiis.in:~# cat overview.md', 300]
                ];

                let currentLine = 0;
                function runScript() {
                    if (currentLine < script.length) {
                        const [type, text, delay] = script[currentLine];
                        const oldCursor = document.querySelector(".cursor");
                        if (oldCursor) oldCursor.remove();

                        const lineDiv = document.createElement("div");
                        lineDiv.className = "line";
                        if (type === "cmd") lineDiv.innerHTML = `<span class=\"command\">${text}</span>`;
                        else if (type === "success") lineDiv.innerHTML = `<span class=\"success\">${text}</span>`;
                        else lineDiv.textContent = text;

                        const cursor = document.createElement("span");
                        cursor.className = "cursor";
                        lineDiv.appendChild(cursor);
                        terminalBody.appendChild(lineDiv);

                        currentLine++;
                        setTimeout(runScript, delay);
                    } else {
                        setTimeout(() => {
                            const oldCursor = document.querySelector(".cursor");
                            if (oldCursor) oldCursor.remove();
                            // 关键：跑完后向父页面发送信号
                            window.parent.postMessage("terminal_animation_complete", "*");
                        }, 200);
                    }
                }
                window.onload = () => setTimeout(runScript, 100);
            </script>
        </body>
        </html>
    '></iframe>

    <!-- 包装容器：收到 iframe 信号后同时展现 -->
    <div id="main-content">
        <article class="px-1">
            {% assign title = page.title %}
            <h1 class="dynamic-title">
                {{ title }}
            </h1>
            <div class="content" style="text-autospace: ideograph-alpha ideograph-numeric ideograph-parenthesis;">
                {{ content }}
            </div>
        </article>

        <div class="music-player">
            {% include music-set.html %}
        </div>
    </div>
</div>

<script>
    // 监听来自 iframe 沙盒的结束信号
    window.addEventListener("message", function(event) {
        if (event.data === "terminal_animation_complete") {
            const mainContent = document.getElementById('main-content');
            if (mainContent) {
                mainContent.style.display = 'block';
                mainContent.offsetHeight; // 触发重绘
                mainContent.classList.add('visible');
            }
        }
    });
</script>
