---
layout: default
---

{% include lang.html %}

<article class="px-1">
    {% assign title = page.title %}
    <h1 class="dynamic-title">
      {{ title }}
    </h1>
    
    <div class="content" style="text-autospace: ideograph-alpha ideograph-numeric ideograph-parenthesis;">
        
        <div class="terminal-container">
          <style>
/* 终端区域完全隔离，不影响正文 */
.terminal-container {
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
}
.terminal {
  background-color: #05070a !important;
  border: 1px solid #30363d !important;
  border-radius: 6px;
  padding: 20px;
  font-family: "Courier New", Courier, monospace !important;
  color: #f0f6fc !important;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  margin-bottom: 30px;
}
.terminal .terminal-header {
  display: flex;
  gap: 8px;
  margin-bottom: 15px;
  border-bottom: 1px solid #30363d;
  padding-bottom: 10px;
}
.terminal .dot { width: 12px; height: 12px; border-radius: 50%; }
.terminal .dot-red { background-color: #ff5f56 !important; }
.terminal .dot-yellow { background-color: #ffbd2e !important; }
.terminal .dot-green { background-color: #27c93f !important; }

/* 关键：强制覆盖主题干扰 */
.terminal .line {
  margin: 3px 0 !important;
  white-space: pre-wrap !important;
  word-break: break-all !important;
  color: #c9d1d9 !important;       /* 主文字色 */
  font-family: inherit !important;
  background: transparent !important;
  border: none !important;
  padding: 0 !important;
  line-height: 1.6 !important;
}
.terminal .command { color: #58a6ff !important; }
.terminal .success { color: #39ff14 !important; }

.terminal .cursor {
  display: inline-block;
  width: 8px;
  height: 18px;
  background-color: #39ff14 !important;
  animation: blink 1s infinite;
  vertical-align: middle;
  margin-left: 4px;
}
@keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

/* 正文渐入保持原样 */
#main-content {
  opacity: 0;
  pointer-events: none;
  transform: translateY(15px);
  transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
#main-content.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}
</style>
            <div class="terminal" id="terminal">
                <div class="terminal-header">
                    <div class="dot dot-red"></div>
                    <div class="dot dot-yellow"></div>
                    <div class="dot dot-green"></div>
                    <span style="margin-left: 10px; font-size: 12px; color: #8b949e;">bash — blog.kawaiis.in</span>
                </div>
                <div id="terminal-body"></div>
            </div>

            <article id="main-content" class="content-area">
                {{ content }}
                <div class="music-player">
                  {% include music-set.html %}
                </div>
            </article>
        </div>

    </div>
</article>

<script>
(function(){
  // 终端动画核心
  function runTerminal(){
    const tb = document.getElementById('terminal-body');
    const mc = document.getElementById('main-content');
    const tf = document.getElementById('terminal');

    // 元素还没出来？50ms 后重试（最多等 5 秒）
    if(!tb || !mc){
      if(window.__terminalRetries === undefined) window.__terminalRetries = 0;
      if(window.__terminalRetries < 100){
        window.__terminalRetries++;
        setTimeout(runTerminal, 50);
      }
      return;
    }

    // 防止重复运行
    if(window.__terminalRan) return;
    window.__terminalRan = true;

    const script = [
      ["cmd", "guest@kawaiis.in:~# grep -R \"Lolin\" ./verse", 400],
      ["log", ">> A password changes, a trend fades, but a well-architected philosophy remains compile-ready.", 200],
      ["cmd", "guest@kawaiis.in:~# curl -s https://blog.kawaiis.in/api/lolin-verse | decrypt", 250],
      ["log", "[INFO] Decrypting \"小狐狸.sys\" [████████████████████] 100%", 400],
      ["cmd", "guest@kawaiis.in:~# ./compile_life.sh --mode=\"gentle\"", 150],
      ["log", "Loading memories: ...", 400],
      ["cmd", "guest@kawaiis.in:~# cat 关乎此间.md", 300]
    ];

    let currentLine = 0;

    function createLine(type, text){
      const lineDiv = document.createElement('div');
      lineDiv.className = 'line';
      lineDiv.style.color = '#c9d1d9';
      lineDiv.style.fontFamily = '"Courier New", Courier, monospace';
      if(type === 'cmd'){
        lineDiv.innerHTML = '<span class="command" style="color:#58a6ff">' + text + '</span>';
      } else if(type === 'success'){
        lineDiv.innerHTML = '<span class="success" style="color:#39ff14">' + text + '</span>';
      } else {
        lineDiv.textContent = text;
      }
      return lineDiv;
    }

    function tick(){
      if(currentLine >= script.length){
        setTimeout(() => {
          const oldCursor = tb.querySelector('.cursor');
          if(oldCursor) oldCursor.remove();
          mc.classList.add('visible');
        }, 200);
        return;
      }

      const [type, text, delay] = script[currentLine];
      const oldCursor = document.querySelector('.cursor');
      if(oldCursor) oldCursor.remove();

      const line = createLine(type, text);
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      cursor.style.display = 'inline-block';
      cursor.style.width = '8px';
      cursor.style.height = '18px';
      cursor.style.backgroundColor = '#39ff14';
      cursor.style.animation = 'blink 1s infinite';
      line.appendChild(cursor);

      tb.appendChild(line);
      if(tf) tf.scrollTop = tf.scrollHeight;
      currentLine++;
      setTimeout(tick, delay);
    }

    tick();

    // 顺便修复音乐播放器 iframe 的错误 src
    const musicFlow = document.getElementById('netease-cloud-music-flow');
    if(musicFlow){
      const iframe = musicFlow.querySelector('iframe');
      if(iframe){
        iframe.src = 'https://music.163.com/outchain/player?type=3&id=2519213563&auto=1&height=66';
        iframe.removeAttribute(',');
        iframe.setAttribute('allow','autoplay; encrypted-media');
      }
    }
  }

  // 立刻执行（若页面已完成加载则直接运行，否则等待）
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', runTerminal);
  } else {
    runTerminal();
  }
})();
</script>
