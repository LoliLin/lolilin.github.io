<script>
(function() {
  /* $$$ ripple script
 */
  var container = document.createElement('div');
  container.className = 'ripple-container';
  document.body.appendChild(container);
  var MAX_RIPPLES = 8;
  var activeRipples = 0;
  document.addEventListener('click', function(e) {
    var tag = e.target.tagName;
    if (tag === 'BUTTON' || tag === 'A' || tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    if (e.target.closest('.btn, [role="button"], .card-wrapper')) return;
    if (activeRipples >= MAX_RIPPLES) {
      var old = container.querySelector('.ripple-dot');
      if (old) { old.remove(); activeRipples--; }
    }
    var dot = document.createElement('span');
    dot.className = 'ripple-dot';
    var size = 30 + Math.random() * 50;
    dot.style.width = size + 'px';
    dot.style.height = size + 'px';
    dot.style.left = e.clientX + 'px';
    dot.style.top = e.clientY + 'px';
    container.appendChild(dot);
    activeRipples++;
    dot.addEventListener('animationend', function() {
      dot.remove();
      activeRipples--;
    });
  });
})();
</script>

<script>
/* 定义转换函数类型：接收原始 HTML 字符串，返回修改后的 HTML 字符串 */
class TransformedIframe extends HTMLElement {
  static observedAttributes = ['src', 'function'];

  constructor() {
    super();
    this.attachShadow({ mode: 'open' });
    this.iframe = document.createElement('iframe');
    this.iframe.style.width = '100%';
    this.iframe.style.height = '100%';
    this.iframe.style.border = 'none';
    this.shadowRoot.appendChild(this.iframe);

    this.currentSrc = null;
    this.abortController = null;
    this._customTransformFn = null;      
    this._attrTransformFn = null;        
  }


  get transformFn() {
    return this._customTransformFn ?? this._attrTransformFn;
  }


  set transformFn(fn) {
    if (typeof fn === 'function') {
      this._customTransformFn = fn;
      this._attrTransformFn = null; 
    } else {
      this._customTransformFn = null;
      this._resolveFunctionFromAttribute();
    }
    this.loadContent();
  }


  _resolveFunctionFromAttribute() {
    const funcName = this.getAttribute('function');
    if (funcName && typeof window[funcName] === 'function') {
      this._attrTransformFn = window[funcName];
    } else {
      this._attrTransformFn = null;
    }
  }

  connectedCallback() {
    this._resolveFunctionFromAttribute();
    this.loadContent();
  }

  attributeChangedCallback(name, oldValue, newValue) {
    if (oldValue === newValue) return;
    if (name === 'src') {
      this.loadContent();
    } else if (name === 'function') {
      this._resolveFunctionFromAttribute();
      this.loadContent();
    }
  }


  _abortPendingFetch() {
    if (this.abortController) {
      this.abortController.abort();
      this.abortController = null;
    }
  }


  async loadContent() {
    const src = this.getAttribute('src');
    if (!src) {
      this.iframe.srcdoc = '';
      return;
    }

    this._abortPendingFetch();
    this.abortController = new AbortController();
    const signal = this.abortController.signal;

    try {
      const response = await fetch(src, { signal });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      let originalHtml = await response.text();

      const transform = this.transformFn;
      let finalHtml = originalHtml;
      if (transform && typeof transform === 'function') {
        try {
          finalHtml = transform(originalHtml);
          if (typeof finalHtml !== 'string') finalHtml = originalHtml;
        } catch (err) {
          console.error('转换函数执行失败:', err);
        }
      }

      this.iframe.srcdoc = finalHtml;
    } catch (err) {
      if (err.name !== 'AbortError') {
        console.error('加载失败:', err);
        this.iframe.srcdoc = `<div style="color:red;padding:1rem;">加载失败: ${err.message}</div>`;
      }
    } finally {
      this.abortController = null;
    }
  }


  reload() {
    this.loadContent();
  }

  disconnectedCallback() {
    this._abortPendingFetch();
  }
}

customElements.define('transformed-iframe', TransformedIframe);
</script>
