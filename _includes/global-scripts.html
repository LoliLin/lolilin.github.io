<script src="https://keepandroidopen.org/banner.js"></script>

<script>
(function() {
  // 创建容器
  var container = document.createElement('div');
  container.className = 'ripple-container';
  document.body.appendChild(container);
  // 限制同时存在的波纹数量，防止性能问题
  var MAX_RIPPLES = 8;
  var activeRipples = 0;
  document.addEventListener('click', function(e) {
    // 忽略交互元素上的点击（按钮、链接、输入框），避免遮挡体验
    var tag = e.target.tagName;
    if (tag === 'BUTTON' || tag === 'A' || tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    // 忽略有 btn 类或 role="button" 的元素
    if (e.target.closest('.btn, [role="button"], .card-wrapper')) return;
    // 清理过多的旧波纹
    if (activeRipples >= MAX_RIPPLES) {
      var old = container.querySelector('.ripple-dot');
      if (old) { old.remove(); activeRipples--; }
    }
    var dot = document.createElement('span');
    dot.className = 'ripple-dot';
    // 随机大小 30~80px
    var size = 30 + Math.random() * 50;
    dot.style.width = size + 'px';
    dot.style.height = size + 'px';
    dot.style.left = e.clientX + 'px';
    dot.style.top = e.clientY + 'px';
    container.appendChild(dot);
    activeRipples++;
    // 动画结束后自动移除
    dot.addEventListener('animationend', function() {
      dot.remove();
      activeRipples--;
    });
  });
})();
</script>
